services:
  - type: web
    name: email-sender
    runtime: python
    pythonVersion: 3.11
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn --bind 0.0.0.0:$PORT emailssender:app"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
      - key: SENDER_EMAIL
        sync: false
      - key: APP_PASSWORD
        sync: false
      - key: SMTP_SERVER
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 587
